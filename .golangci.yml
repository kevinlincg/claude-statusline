version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - gosec
    - unconvert
    - unused
  settings:
    gosec:
      excludes:
        - G101 # False positive: color codes look like credentials
        - G104 # Audit errors not checked (allow for some error ignoring)
        - G304 # File path provided as taint input (allow file reading)
        - G306 # WriteFile with 0644 is fine for user config files

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes: statusline

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - unused
  max-issues-per-linter: 50
  max-same-issues: 10
