version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - staticcheck
    - gosec
    - unconvert
    - unused
  settings:
    gosec:
      excludes:
        - G101 # False positive: color codes look like credentials
        - G104 # Audit errors not checked (allow for some error ignoring)
        - G115 # Integer overflow conversion (uintptr->int, int->rune) safe in context
        - G301 # Directory permissions 0755 is fine for user data dirs
        - G304 # File path provided as taint input (allow file reading)
        - G306 # WriteFile with 0644 is fine for user config files
        - G602 # Slice index out of range (false positive)
        - G703 # Path traversal via config dir (not user-controlled)
    staticcheck:
      checks:
        - "all"
        - "-QF*" # Disable quickfix suggestions
        - "-ST1000" # Package comments not needed for theme files

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - statusline
